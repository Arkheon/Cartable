<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nombres décimaux — CM1 — Mon Cartable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../../assets/css/shared.css">
<style>
  :root { --subject: #2563eb; --subject-dark: #1e40af; }

  body  { display: flex; flex-direction: column; gap: 16px; }
  #game { display: flex; flex-direction: column; gap: 16px; }

  .topbar { display: flex; align-items: center; }
  .progress-wrap { flex: 1; background: #e5e7eb; border-radius: 99px; height: 8px; overflow: hidden; margin: 0 12px; }
  .progress-fill { background: var(--subject); height: 100%; border-radius: 99px; width: 0%; transition: width 0.4s ease; }
  .progress-text { font-size: 15px; font-weight: 600; color: var(--muted); min-width: 48px; text-align: right; }

  .question-card {
    background: white;
    border-radius: 24px;
    padding: 24px 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    text-align: center;
  }

  .q-label {
    font-size: 15px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 8px;
  }

  /* Choix de nombres decimaux */
  .decimal-choices {
    display: grid;
    gap: 12px;
  }

  .decimal-choices.two   { grid-template-columns: 1fr 1fr; }
  .decimal-choices.three { grid-template-columns: 1fr 1fr 1fr; }

  .dec-btn {
    background: var(--subject);
    box-shadow: 0 4px 0 var(--subject-dark);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 22px 8px;
    font-family: 'Fredoka', sans-serif;
    font-size: 28px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    /* Remplacer la virgule par un point à l'affichage */
  }
  .dec-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--subject-dark); }
  .dec-btn[disabled] { cursor: default; }
  .dec-btn.correct { background: #16a34a; box-shadow: 0 4px 0 #14532d; }
  .dec-btn.wrong   { background: #dc2626; box-shadow: 0 4px 0 #991b1b; }

  /* Feedback */
  .hint-box { background: #eff6ff; border-radius: 14px; padding: 14px 16px; font-size: 15px; font-weight: 500; color: #1e40af; display: none; }
  .hint-box.visible { display: block; }

  .btn-next { background: var(--subject); box-shadow: 0 4px 0 var(--subject-dark); color: white; border: none; border-radius: 16px; padding: 18px; font-family: 'Fredoka', sans-serif; font-size: 18px; font-weight: 700; cursor: pointer; width: 100%; transition: transform 0.1s, box-shadow 0.1s; }
  .btn-next:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--subject-dark); }
  .btn-next.hidden { display: none; }

  /* Résumé */
  .summary { display: none; flex-direction: column; align-items: center; gap: 20px; text-align: center; padding: 24px 0; }
  .summary.visible { display: flex; }
  .summary-icon  { font-size: 72px; line-height: 1; }
  .summary-title { font-size: 26px; font-weight: 700; color: var(--text); }
  .summary-sub   { font-size: 16px; color: var(--muted); margin-top: -10px; }
  .btn-restart   { border: none; border-radius: 16px; padding: 18px; font-family: 'Fredoka', sans-serif; font-size: 18px; font-weight: 700; color: white; cursor: pointer; background: var(--subject); box-shadow: 0 4px 0 var(--subject-dark); transition: transform 0.1s, box-shadow 0.1s; width: 100%; }
  .btn-restart:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--subject-dark); }

  @media (min-width: 600px) { .dec-btn { font-size: 36px; } }
</style>
</head>
<body>

<div id="game">
  <div class="topbar">
    <a href="../index.html" class="back-link">← Retour</a>
    <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>
    <span class="progress-text" id="progressText"></span>
  </div>

  <div class="question-card">
    <p class="q-label" id="qLabel"></p>
    <div id="choicesArea"></div>
  </div>

  <div class="hint-box" id="hintBox"></div>

  <button class="btn-next hidden" id="btnNext">Question suivante →</button>
</div>

<div class="summary" id="summary">
  <div class="summary-icon"  id="sumIcon"></div>
  <div class="summary-title" id="sumTitle"></div>
  <div class="summary-sub"   id="sumSub"></div>
  <button class="btn-restart" id="btnRestart">Recommencer</button>
</div>

<script>
  const TOTAL = 10;

  // Nombre décimal aléatoire arrondi à 1 ou 2 décimales
  function randDec(twoDecimals = false) {
    const intPart = Math.floor(Math.random() * 9) + 1; // 1-9
    if (twoDecimals) {
      const dec = Math.floor(Math.random() * 99) + 1; // 01-99
      return parseFloat(`${intPart}.${String(dec).padStart(2,'0')}`);
    } else {
      const dec = Math.floor(Math.random() * 9) + 1; // 1-9
      return parseFloat(`${intPart}.${dec}`);
    }
  }

  // Formatage avec virgule française
  function fmt(n) { return n.toFixed(n % 1 >= 0.1 || n % 1 === 0 ? 1 : 2).replace('.', ','); }

  function buildDeck() {
    const deck = [];
    for (let i = 0; i < TOTAL; i++) {
      const useTwoDecimals = i >= 5; // premières questions en dixièmes, suite en centièmes
      deck.push(buildQuestion(useTwoDecimals));
    }
    shuffle(deck);
    return deck;
  }

  function buildQuestion(twoDecimals) {
    // Générer 2 nombres distincts (type: compare)
    let a, b;
    do {
      a = randDec(twoDecimals);
      b = randDec(twoDecimals);
    } while (a === b || Math.abs(a - b) < 0.01);

    const type = Math.random() < 0.5 ? 'max' : 'min';
    const correct = type === 'max' ? Math.max(a, b) : Math.min(a, b);
    const label = type === 'max' ? 'Quel est le plus grand ?' : 'Quel est le plus petit ?';
    const hint  = type === 'max'
      ? `${fmt(a)} ${a > b ? '>' : '<'} ${fmt(b)} — le plus grand est ${fmt(correct)}`
      : `${fmt(a)} ${a < b ? '<' : '>'} ${fmt(b)} — le plus petit est ${fmt(correct)}`;

    return { nums: shuffle([a, b]), correct, label, hint };
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length-1; i > 0; i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }

  let questions = buildDeck(), idx = 0, score = 0, answered = false;

  const choicesArea = document.getElementById('choicesArea');
  const qLabel      = document.getElementById('qLabel');
  const hintBox     = document.getElementById('hintBox');
  const progFill    = document.getElementById('progressFill');
  const progText    = document.getElementById('progressText');
  const btnNext     = document.getElementById('btnNext');
  const gameDiv     = document.getElementById('game');
  const summaryDiv  = document.getElementById('summary');

  function showQuestion() {
    answered = false;
    const q = questions[idx];
    qLabel.textContent = q.label;
    hintBox.classList.remove('visible');
    btnNext.classList.add('hidden');
    progText.textContent = `${idx + 1} / ${TOTAL}`;
    progFill.style.width = `${(idx / TOTAL) * 100}%`;

    const grid = document.createElement('div');
    grid.className = `decimal-choices ${q.nums.length === 2 ? 'two' : 'three'}`;

    q.nums.forEach(val => {
      const btn = document.createElement('button');
      btn.className = 'dec-btn';
      btn.textContent = fmt(val);
      btn.dataset.val = val;
      btn.addEventListener('click', () => answer(val === q.correct, btn, q));
      grid.appendChild(btn);
    });

    choicesArea.innerHTML = '';
    choicesArea.appendChild(grid);
  }

  function answer(isCorrect, btn, q) {
    if (answered) return;
    answered = true;
    choicesArea.querySelectorAll('.dec-btn').forEach(b => {
      b.disabled = true;
      if (+b.dataset.val === q.correct) b.classList.add('correct');
    });
    if (!isCorrect) btn.classList.add('wrong');
    else score++;
    hintBox.textContent = (isCorrect ? '✓ ' : '💡 ') + q.hint;
    hintBox.classList.add('visible');
    btnNext.textContent = idx === TOTAL - 1 ? 'Voir mon score' : 'Question suivante →';
    btnNext.classList.remove('hidden');
  }

  btnNext.addEventListener('click', () => { idx++; if (idx >= TOTAL) showSummary(); else showQuestion(); });

  function showSummary() {
    progFill.style.width = '100%';
    gameDiv.style.display = 'none';
    summaryDiv.classList.add('visible');
    const pct = score / TOTAL;
    const tier = pct === 1 ? 4 : pct >= 0.8 ? 3 : pct >= 0.6 ? 2 : pct >= 0.4 ? 1 : 0;
    document.getElementById('sumIcon').textContent  = ['💪','👍','⭐⭐','⭐⭐⭐','🎉'][tier];
    document.getElementById('sumTitle').textContent = ['Continue !','Pas mal !','Bien !','Très bien !','Parfait !'][tier];
    document.getElementById('sumSub').textContent   = `${score} / ${TOTAL} bonnes réponses`;
  }

  document.getElementById('btnRestart').addEventListener('click', () => {
    questions = buildDeck(); idx = 0; score = 0;
    gameDiv.style.display = '';
    summaryDiv.classList.remove('visible');
    showQuestion();
  });

  showQuestion();
</script>
</body>
</html>
