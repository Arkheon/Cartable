<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mots outils — Français CP — Mon Cartable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../../assets/css/shared.css">
<style>
  :root {
    --subject:      #dc2626;
    --subject-dark: #991b1b;
  }

  body  { display: flex; flex-direction: column; gap: 16px; }
  #game { display: flex; flex-direction: column; gap: 16px; }

  .topbar { display: flex; align-items: center; }
  .progress-wrap { flex: 1; background: #e5e7eb; border-radius: 99px; height: 8px; overflow: hidden; margin: 0 12px; }
  .progress-fill { background: var(--subject); height: 100%; border-radius: 99px; width: 0%; transition: width 0.4s ease; }
  .progress-text { font-size: 15px; font-weight: 600; color: var(--muted); min-width: 48px; text-align: right; }

  /* Carte mot-outil */
  .word-card {
    background: white;
    border-radius: 24px;
    border: 3px solid #fecaca;
    box-shadow: 0 4px 20px rgba(0,0,0,0.07);
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 32px 24px;
    user-select: none;
  }

  .word-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
  }

  .word-text {
    font-size: 72px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    text-align: center;
  }

  /* Barre timer */
  .timer-wrap {
    width: 100%;
    background: #f3f4f6;
    border-radius: 99px;
    height: 10px;
    overflow: hidden;
  }

  .timer-bar {
    height: 100%;
    border-radius: 99px;
    width: 100%;
    transition: width 0.1s linear, background-color 0.3s ease;
    background: #16a34a;
  }
  .timer-bar.amber { background: #d97706; }
  .timer-bar.red   { background: #dc2626; }

  /* Boutons */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .btn-action {
    border: none;
    border-radius: 16px;
    padding: 18px 8px;
    font-family: 'Fredoka', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: white;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn-action:active { transform: translateY(3px); }
  .btn-review { background: #d97706; box-shadow: 0 4px 0 #92400e; }
  .btn-review:active { box-shadow: 0 1px 0 #92400e; }
  .btn-know   { background: var(--subject); box-shadow: 0 4px 0 var(--subject-dark); }
  .btn-know:active { box-shadow: 0 1px 0 var(--subject-dark); }

  /* Résumé */
  .summary { display: none; flex-direction: column; align-items: center; gap: 20px; text-align: center; padding: 24px 0; }
  .summary.visible { display: flex; }
  .summary-icon  { font-size: 72px; line-height: 1; }
  .summary-title { font-size: 26px; font-weight: 700; color: var(--text); }
  .summary-sub   { font-size: 16px; color: var(--muted); margin-top: -10px; }
  .summary-btns  { display: flex; flex-direction: column; gap: 12px; width: 100%; }

  .btn-restart {
    border: none; border-radius: 16px; padding: 18px;
    font-family: 'Fredoka', sans-serif; font-size: 18px; font-weight: 700;
    color: white; cursor: pointer; transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn-restart:active { transform: translateY(3px); }
  .btn-all    { background: var(--subject); box-shadow: 0 4px 0 var(--subject-dark); }
  .btn-all:active { box-shadow: 0 1px 0 var(--subject-dark); }
  .btn-missed { background: #d97706; box-shadow: 0 4px 0 #92400e; }
  .btn-missed:active { box-shadow: 0 1px 0 #92400e; }

  @media (min-width: 600px) {
    .word-text { font-size: 96px; }
    .summary-btns { flex-direction: row; }
  }
</style>
</head>
<body>

<div id="game">
  <div class="topbar">
    <a href="../index.html" class="back-link">← Retour</a>
    <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>
    <span class="progress-text" id="progressText"></span>
  </div>

  <div class="word-card">
    <span class="word-label">Lis ce mot</span>
    <span class="word-text" id="wordText"></span>
    <div class="timer-wrap">
      <div class="timer-bar" id="timerBar"></div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-action btn-review" id="btnReview">↩ À revoir</button>
    <button class="btn-action btn-know"   id="btnKnow"  >✓ Je sais !</button>
  </div>
</div>

<div class="summary" id="summary">
  <div class="summary-icon"  id="summaryIcon"></div>
  <div class="summary-title" id="summaryTitle"></div>
  <div class="summary-sub"   id="summarySub"></div>
  <div class="summary-btns">
    <button class="btn-restart btn-all"    id="btnAll">Recommencer tout</button>
    <button class="btn-restart btn-missed" id="btnMissed" style="display:none"></button>
  </div>
</div>

<script>
  const MOTS_OUTILS = [
    'le','la','les','un','une','des',
    'et','ou','mais','donc','or','ni','car',
    'dans','sur','sous','avec','sans','pour','par','vers',
    'de','du','au','aux',
    'je','tu','il','elle','nous','vous','ils','elles',
    'me','te','se','lui','leur',
    'mon','ton','son','ma','ta','sa','mes','tes','ses','notre','votre',
    'ce','cet','cette','ces',
    'que','qui','quoi','où','quand','comment','pourquoi',
    'pas','ne','plus','très','bien','aussi','alors',
    'est','sont','ont','a','ont',
    'tout','tous','toute','toutes',
    'même','autre','autres',
    'ici','là','voici','voilà',
  ];

  const TIMER_MS = 6000;
  const TICK_MS  = 50;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length-1; i > 0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  let deck = [], missed = [], idx = 0, known = 0;
  let timerHandle = null, elapsed = 0;

  const wordText   = document.getElementById('wordText');
  const timerBar   = document.getElementById('timerBar');
  const progFill   = document.getElementById('progressFill');
  const progText   = document.getElementById('progressText');
  const gameDiv    = document.getElementById('game');
  const summaryDiv = document.getElementById('summary');
  const summaryIcon  = document.getElementById('summaryIcon');
  const summaryTitle = document.getElementById('summaryTitle');
  const summarySub   = document.getElementById('summarySub');
  const btnAll       = document.getElementById('btnAll');
  const btnMissed    = document.getElementById('btnMissed');

  function startGame(cards) {
    deck = shuffle(cards);
    missed = []; idx = 0; known = 0;
    gameDiv.style.display = '';
    summaryDiv.classList.remove('visible');
    showCard();
  }

  function startTimer() {
    clearInterval(timerHandle);
    elapsed = 0;
    timerBar.style.width = '100%';
    timerBar.className = 'timer-bar';

    timerHandle = setInterval(() => {
      elapsed += TICK_MS;
      const pct = Math.max(0, 1 - elapsed / TIMER_MS);
      timerBar.style.width = (pct * 100) + '%';

      if (pct <= 0.33) timerBar.className = 'timer-bar red';
      else if (pct <= 0.66) timerBar.className = 'timer-bar amber';
      else timerBar.className = 'timer-bar';

      if (elapsed >= TIMER_MS) {
        clearInterval(timerHandle);
        // Temps écoulé → marquer à revoir automatiquement
        next(false);
      }
    }, TICK_MS);
  }

  function showCard() {
    wordText.textContent = deck[idx];
    progText.textContent = `${idx + 1} / ${deck.length}`;
    progFill.style.width = `${(idx / deck.length) * 100}%`;
    startTimer();
  }

  function next(markKnown) {
    clearInterval(timerHandle);
    if (markKnown) known++; else missed.push(deck[idx]);
    idx++;
    if (idx >= deck.length) showSummary(); else showCard();
  }

  function showSummary() {
    progFill.style.width = '100%';
    gameDiv.style.display = 'none';
    summaryDiv.classList.add('visible');

    const total = deck.length;
    if (known === total) {
      summaryIcon.textContent  = '🎉';
      summaryTitle.textContent = 'Parfait !';
      summarySub.textContent   = `Tu connais tous les ${total} mots !`;
    } else {
      summaryIcon.textContent  = known >= total / 2 ? '👍' : '💪';
      summaryTitle.textContent = `${known} / ${total} mots reconnus`;
      summarySub.textContent   = `${missed.length} mot${missed.length > 1 ? 's' : ''} à revoir.`;
    }

    if (missed.length > 0) {
      btnMissed.style.display = '';
      btnMissed.textContent   = `Réviser les ${missed.length} mot${missed.length > 1 ? 's' : ''}`;
    } else {
      btnMissed.style.display = 'none';
    }
  }

  document.getElementById('btnReview').addEventListener('click', () => next(false));
  document.getElementById('btnKnow'  ).addEventListener('click', () => next(true));
  btnAll.addEventListener('click',    () => startGame(MOTS_OUTILS));
  btnMissed.addEventListener('click', () => startGame(missed));

  startGame(MOTS_OUTILS);
</script>

</body>
</html>
